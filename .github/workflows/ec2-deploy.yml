name: CI and Deploy to EC2 (SSM)

on:
  pull_request:
    branches: [main, master]
    paths:
      - "cloud-backend/**"
      - "fog-node/**"
      - "sensors/**"
      - "deploy/ec2/**"
      - ".github/workflows/ec2-deploy.yml"
  push:
    branches: [main]
    paths:
      - "cloud-backend/**"
      - "fog-node/**"
      - "sensors/**"
      - "deploy/ec2/**"
      - ".github/workflows/ec2-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  ci-build:
    name: CI - Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build cloud-backend
        run: docker build -t cloud-backend:ci ./cloud-backend
      - name: Build fog-node
        run: docker build -t fog-node:ci ./fog-node
      - name: Build sensors
        run: docker build -t sensors:ci ./sensors

  deploy-ec2:
    name: CD - Deploy on EC2 via SSM
    needs: ci-build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_PUBLIC_HOST: ${{ secrets.EC2_PUBLIC_HOST }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          missing=0
          [ -z "$EC2_INSTANCE_ID" ] && echo "Missing: EC2_INSTANCE_ID" >&2 && missing=1
          [ -z "$EC2_PUBLIC_HOST" ] && echo "Missing: EC2_PUBLIC_HOST" >&2 && missing=1
          [ -z "$APP_ENV_FILE" ] && echo "Missing: APP_ENV_FILE" >&2 && missing=1
          [ "$missing" -eq 1 ] && exit 1
          echo "All required secrets present."

      - name: Ensure instance is managed by SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          aws ssm describe-instance-information \
            --region "$AWS_REGION" \
            --query "InstanceInformationList[?InstanceId=='$EC2_INSTANCE_ID'].InstanceId" \
            --output text | grep -q "$EC2_INSTANCE_ID"

      - name: Publish .env to SSM Parameter Store
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --name "/smart-outfit/app/env" \
            --type String \
            --overwrite \
            --value "$APP_ENV_FILE" >/dev/null
          echo "Parameter written."

      - name: Build SSM commands payload
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          mkdir -p .ci
          cat > .ci/commands.json <<EOF
          {
            "commands": [
              "set -eu",
              "export HOME=/root",
              "sudo git config --system --add safe.directory /opt/smart-outfit || true",
              "if [ ! -d /opt/smart-outfit/.git ]; then sudo rm -rf /opt/smart-outfit && sudo mkdir -p /opt/smart-outfit && sudo chown ubuntu:ubuntu /opt/smart-outfit && sudo -u ubuntu git clone ${REPO_URL} /opt/smart-outfit; fi",
              "cd /opt/smart-outfit",
              "sudo -u ubuntu git fetch --all --prune",
              "sudo -u ubuntu git checkout -f ${GITHUB_SHA}",
              "sudo aws ssm get-parameter --region ${AWS_REGION} --name /smart-outfit/app/env --query Parameter.Value --output text > /tmp/smart-outfit.env",
              "sudo install -m 600 -o ubuntu -g ubuntu /tmp/smart-outfit.env /opt/smart-outfit/.env",
              "sudo rm -f /tmp/smart-outfit.env",
              "sudo chmod +x deploy/ec2/deploy-ec2.sh",
              "sudo -u ubuntu bash -lc 'cd /opt/smart-outfit && ./deploy/ec2/deploy-ec2.sh'"
            ]
          }
          EOF
          echo "commands.json contents:" && cat .ci/commands.json

      - name: Deploy on EC2 via AWS-RunShellScript
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -e
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy smart-outfit ${GITHUB_SHA}" \
            --cli-input-json "$(jq -n --argjson p "$(cat .ci/commands.json)" '{DocumentName:"AWS-RunShellScript",Parameters:$p,InstanceIds:[env.EC2_INSTANCE_ID]}')" \
            --query "Command.CommandId" \
            --output text 2>/dev/null) || true

          if [ -z "$COMMAND_ID" ] || [ "$COMMAND_ID" = "None" ]; then
            # Fallback to passing parameters via --parameters file://
            COMMAND_ID=$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy smart-outfit ${GITHUB_SHA}" \
              --parameters "file://.ci/commands.json" \
              --query "Command.CommandId" \
              --output text)
          fi

          echo "Dispatched SSM command: $COMMAND_ID"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"
          WAIT_EXIT=$?
          set -e

          STATUS=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "SSM status: $STATUS (wait exit $WAIT_EXIT)"
          echo "----- SSM STDOUT -----"
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text || true

          echo "----- SSM STDERR -----"
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text || true

          if [ "$STATUS" != "Success" ] || [ "$WAIT_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Verify deployment health
        env:
          EC2_PUBLIC_HOST: ${{ secrets.EC2_PUBLIC_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "http://$EC2_PUBLIC_HOST/api/health" > /dev/null; then
              echo "Healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Service health check failed after retries" >&2
          exit 1
